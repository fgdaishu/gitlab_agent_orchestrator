  - src/signature.rs
  - src/error.rs
  - src/lib.rs
  - tests/signature.rs
  - .agent/handoffs/
  - reports/

forbidden_files:
  - docs/

validation_commands:
  - cargo test --test signature

handoff_required:
  - implementation summary
  - tests run
  - edge cases handled
  - context for PNG-CHUNK-001
